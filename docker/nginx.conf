server {
    listen NGINX_PORT default_server;
    root /var/www/html;
    index index.php;
    client_max_body_size 12M;

    # Cache headers para PHP (sem cache)
    add_header X-Content-Type-Options nosniff;

    # Estáticos direto pelo Nginx
    location ~* \.(css|js|png|jpg|jpeg|gif|webp|svg|ico|woff|woff2|ttf|json|pdf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Bloquear arquivos sensíveis
    location ~ /\.(git|env|htaccess) { deny all; }

    # Tudo mais: PHP via index.php (rota única, simples)
    location / {
        # Se o arquivo PHP existe (setup.php), executa direto
        # Senão, manda tudo pro index.php
        try_files $uri /index.php$is_args$args;
        
        location ~ \.php$ {
            fastcgi_pass 127.0.0.1:9000;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param PATH_INFO $fastcgi_path_info;
            # Forçar no-cache para respostas PHP
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        }
    }
}
