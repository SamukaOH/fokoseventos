server {
    listen NGINX_PORT default_server;
    server_name _;
    root /var/www/html;
    index index.php;
    client_max_body_size 12M;

    # Estáticos direto pelo Nginx
    location ~* \.(css|js|png|jpg|jpeg|gif|webp|svg|ico|woff|woff2|ttf|pdf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /manifest.json { try_files $uri =404; }
    location ~ /\.(git|env|htaccess) { deny all; }

    # Arquivos PHP físicos (setup.php, whoami.php) → executam direto
    location ~ ^/(setup|migrate)\.php$ {
        fastcgi_pass 127.0.0.1:9000;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # Todas as rotas do app → index.php (front controller)
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Handler PHP: SEMPRE executa index.php para rotas do app
    location = /index.php {
        fastcgi_pass 127.0.0.1:9000;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        add_header Cache-Control "no-store" always;
    }
}
